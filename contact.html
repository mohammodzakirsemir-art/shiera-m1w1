<!DOCTYPE html>
<html lang="en">
<head>
<!-- 1. Tailwind CSS Script -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
      }
    </script>

    <!-- 2. Persistent Dark Mode Logic -->
    <script>
      const root = document.documentElement;
      const saved = localStorage.getItem("theme");
      if (saved === "dark") root.classList.add("dark");
    </script>
</head>

<body class="bg-white text-black dark:bg-zinc-900 dark:text-white transition-colors duration-200"></body>

<header>

<h1>Contact Me</h1>

<nav class="nav">
  <div class="nav__links">
    <a href="index.html">Home</a> |
    <a href="projects.html">Projects</a> |
    <a href="contact.html">Contact</a>
    <button id="theme-toggle" class="p-1 ml-2 rounded bg-gray-200 dark:bg-zinc-700 text-sm font-semibold">
  🌓 Toggle Theme
</button>
  </div>
</nav>

</header>

<main>

<form>

<label for="name">Name</label><br>
<input id="name" type="text" required><br><br>

<label for="email">Email</label><br>
<input id="email" type="email" required><br><br>

<label for="message">Message</label><br>
<textarea id="message" rows="5" cols="30" required></textarea><br><br>

<button type="submit">Send</button>

</form>

</main>

<footer>

<p>© 2026 Semir Mohammed</p>

</footer>
<script>
  document.getElementById("theme-toggle").addEventListener("click", () => {
    const root = document.documentElement;
    root.classList.toggle("dark");
    localStorage.setItem("theme", root.classList.contains("dark") ? "dark" : "light");
  });
</script>
</body>
</html>
